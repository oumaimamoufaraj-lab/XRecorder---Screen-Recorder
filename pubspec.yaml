name: now_recorder
description: NowRecorder - Privacy-first screen recorder
publish_to: 'none'
version: 1.1.0+5

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.3
  flutter_screen_recording: ^2.0.18
  photo_manager: ^3.7.1
  video_player: ^2.10.0
  share_plus: ^11.0.0
  url_launcher: ^6.3.1
  path_provider: ^2.1.6
  video_thumbnail: ^0.5.6
  google_mlkit_text_recognition: ^0.15.1
  ffmpeg_kit_flutter_new: ^4.2.1
  uuid: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/app_icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/app_icon.png
  remove_alpha_ios: true
